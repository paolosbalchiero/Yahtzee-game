<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahtzee</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html { color-scheme: dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0c0c0e !important;
color: #f0ede8 !important;
-webkit-text-fill-color: #f0ede8;
font-family: ‘Inconsolata’, monospace;
font-size: 14px;
min-height: 100vh;
}

/* ══════════════════════════════════════
SETUP
══════════════════════════════════════ */
#screen-setup {
display: flex; flex-direction: column; align-items: center;
justify-content: center; min-height: 100vh; padding: 32px 16px;
}
.logo { font-family:‘Bebas Neue’,sans-serif; font-size:86px; color:#f0c040; letter-spacing:5px; line-height:1; }
.logo-sub { font-size:10px; letter-spacing:.22em; color:#4a4a56; text-transform:uppercase; margin-bottom:36px; }
.setup-card { background:#18181c; border:1px solid #2a2a32; border-radius:6px; padding:28px; width:100%; max-width:420px; }
.lbl { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#5a5a66; margin-bottom:10px; display:block; }
.count-row { display:flex; gap:6px; margin-bottom:24px; }
.cnt-btn {
flex:1; height:44px; background:#111114; border:1px solid #2a2a32;
color:#5a5a66; -webkit-text-fill-color:#5a5a66;
font-family:‘Bebas Neue’,sans-serif; font-size:22px;
cursor:pointer; border-radius:4px; transition:all .12s;
}
.cnt-btn:hover { border-color:#4a4a56; color:#f0ede8; -webkit-text-fill-color:#f0ede8; }
.cnt-btn.on { background:#f0c040; border-color:#f0c040; color:#000!important; -webkit-text-fill-color:#000!important; }
#name-fields { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.nf-row { display:flex; align-items:center; gap:10px; }
.p-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.n-inp {
flex:1; height:42px; background:#111114!important; border:1px solid #2a2a32; border-radius:4px;
color:#f0ede8!important; -webkit-text-fill-color:#f0ede8!important;
font-family:‘Inconsolata’,monospace; font-size:15px; font-weight:700;
padding:0 12px; outline:none; transition:border-color .12s;
}
.n-inp:focus { border-color:#f0c040; }
.n-inp::placeholder { color:#3a3a44!important; -webkit-text-fill-color:#3a3a44!important; font-weight:400; }
.btn-go {
width:100%; height:50px; background:#f0c040; border:none;
color:#000!important; -webkit-text-fill-color:#000!important;
font-family:‘Bebas Neue’,sans-serif; font-size:20px; letter-spacing:2px;
cursor:pointer; border-radius:4px; transition:opacity .12s;
}
.btn-go:hover { opacity:.85; }
.btn-go:disabled { opacity:.28; cursor:not-allowed; }

/* ══════════════════════════════════════
GAME — desktop: two columns
mobile: score panel + fixed bottom dice bar
══════════════════════════════════════ */
#screen-game { display:none; }

.game-cols {
display: flex;
min-height: 100vh;
padding-bottom: 0;
}

/* ── LEFT / TOP: score ── */
#score-col {
flex: 1;
padding: 18px 14px 32px;
min-width: 0;
/* on mobile leave space for bottom bar */
}

/* ── RIGHT: dice panel (desktop sidebar) ── */
#dice-col {
width: 272px;
flex-shrink: 0;
background: #111114;
border-left: 1px solid #2a2a32;
padding: 20px 18px;
display: flex;
flex-direction: column;
gap: 14px;
position: sticky;
top: 0;
height: 100vh;
overflow-y: auto;
}

/* ── MOBILE overrides ── */
@media (max-width: 700px) {
.game-cols { flex-direction: column; padding-bottom: 200px; }
#dice-col {
display: none; /* hidden — replaced by bottom bar */
}
#score-col { padding: 14px 10px 0; }
}

/* ══════════════════════════════════════
BOTTOM BAR (mobile only)
══════════════════════════════════════ */
#dice-bar {
display: none;
position: fixed;
bottom: 0; left: 0; right: 0;
background: #111114;
border-top: 1px solid #2a2a32;
padding: 10px 12px 14px;
z-index: 100;
/* safe area for notch phones */
padding-bottom: max(14px, env(safe-area-inset-bottom));
}
@media (max-width: 700px) { #dice-bar { display: block; } }

/* inner layout of the bar: turn info left, roll button right, dice in middle */
.bar-top {
display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.bar-turn {
flex: 1; min-width: 0;
}
.bar-turn-lbl { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:#5a5a66; }
.bar-turn-name {
font-family:‘Bebas Neue’,sans-serif; font-size:22px; letter-spacing:1px; line-height:1;
white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.bar-pips { display:flex; gap:4px; align-items:center; margin-top:3px; }
.rp { width:8px; height:8px; border-radius:50%; background:#2a2a32; transition:background .2s; }
.rp.used { background:#f0c040; }

.bar-roll-btn {
height:44px; padding:0 18px;
background:#f0c040; border:none;
color:#000!important; -webkit-text-fill-color:#000!important;
font-family:‘Bebas Neue’,sans-serif; font-size:18px; letter-spacing:1.5px;
cursor:pointer; border-radius:5px; white-space:nowrap;
transition:opacity .12s; flex-shrink:0;
}
.bar-roll-btn:hover { opacity:.85; }
.bar-roll-btn:disabled { opacity:.25; cursor:not-allowed; background:#2a2a32; color:#5a5a66!important; -webkit-text-fill-color:#5a5a66!important; }

.bar-dice {
display: flex; gap: 8px; justify-content: center;
}
.bar-dice .die { flex: 1; }

/* ══════════════════════════════════════
DICE (shared styles)
══════════════════════════════════════ */
.die {
aspect-ratio: 1/1;
border-radius: 10px;
cursor: pointer;
user-select: none;
position: relative;
overflow: hidden;
transition: transform .1s;
/* border drawn on canvas */
}
.die:active:not(.no-click) { transform: scale(.91); }
.die.no-click { cursor: default; pointer-events: none; opacity: .35; }
.die canvas { display: block; width: 100%; height: 100%; border-radius: 10px; }

/* hold ring */
.die.held { box-shadow: 0 0 0 2.5px #4ade80, 0 0 10px #4ade8030; }

/* Bounce animation on land */
@keyframes dieBounce {
0%   { transform: scale(1); }
30%  { transform: scale(1.12); }
55%  { transform: scale(.95); }
75%  { transform: scale(1.04); }
100% { transform: scale(1); }
}
.die.bounce { animation: dieBounce .42s ease forwards; }

/* Fade between values */
@keyframes dieFade {
0%   { opacity: .3; }
100% { opacity: 1; }
}
.die.fade-in { animation: dieFade .18s ease forwards; }

/* ══════════════════════════════════════
DICE PANEL (desktop sidebar)
══════════════════════════════════════ */
.dp-header { display:flex; align-items:center; justify-content:space-between; }
.dp-logo { font-family:‘Bebas Neue’,sans-serif; font-size:32px; color:#f0c040; letter-spacing:2px; line-height:1; }
.btn-sm {
background:none; border:1px solid #2a2a32; color:#5a5a66; -webkit-text-fill-color:#5a5a66;
font-family:‘Inconsolata’,monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
padding:5px 10px; cursor:pointer; border-radius:4px; transition:all .12s;
}
.btn-sm:hover { border-color:#f87171; color:#f87171; -webkit-text-fill-color:#f87171; }

.turn-card {
background:#18181c; border:1px solid #2a2a32; border-radius:5px; padding:10px 12px;
}
.turn-lbl { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#5a5a66; margin-bottom:3px; }
.turn-name { font-family:‘Bebas Neue’,sans-serif; font-size:26px; letter-spacing:1px; line-height:1; }
.turn-pips { display:flex; gap:4px; margin-top:5px; align-items:center; }
.pip-lbl { font-size:9px; color:#5a5a66; letter-spacing:.08em; text-transform:uppercase; margin-right:2px; }

.dice-grid-desktop {
display: grid;
grid-template-columns: repeat(5,1fr);
gap: 8px;
}

.btn-roll-desktop {
height:52px;
background:#f0c040; border:none;
color:#000!important; -webkit-text-fill-color:#000!important;
font-family:‘Bebas Neue’,sans-serif; font-size:22px; letter-spacing:2px;
cursor:pointer; border-radius:5px; transition:opacity .12s, background .2s;
}
.btn-roll-desktop:hover { opacity:.88; }
.btn-roll-desktop:disabled { opacity:.22; cursor:not-allowed; background:#1e1e24; color:#5a5a66!important; -webkit-text-fill-color:#5a5a66!important; }
.roll-hint { font-size:9px; color:#4a4a56; text-align:center; letter-spacing:.04em; }

/* suggestions */
.sug-title { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#5a5a66; margin-bottom:6px; }
.sug-scroll { overflow-y:auto; flex:1; }
.sug-list { display:flex; flex-direction:column; gap:4px; }
.sug-btn {
display:flex; align-items:center; justify-content:space-between;
border-radius:4px; padding:7px 9px; cursor:pointer; width:100%;
font-family:‘Inconsolata’,monospace; font-size:11px; border:1.5px solid transparent;
transition:opacity .12s; text-align:left;
}
.sug-btn:hover { opacity:.78; }
.sug-btn.sg { background:#1a3010; border-color:#4ade8066; color:#a0e890!important; -webkit-text-fill-color:#a0e890!important; }
.sug-btn.sg .sug-pts { color:#4ade80!important; -webkit-text-fill-color:#4ade80!important; }
.sug-btn.sy { background:#1e1c0a; border-color:#f0c04055; color:#c8be80!important; -webkit-text-fill-color:#c8be80!important; }
.sug-btn.sy .sug-pts { color:#f0c040!important; -webkit-text-fill-color:#f0c040!important; }
.sug-btn.sr { background:#2a1212; border-color:#f8717155; color:#e09090!important; -webkit-text-fill-color:#e09090!important; opacity:.7; }
.sug-btn.sr .sug-pts { color:#f87171!important; -webkit-text-fill-color:#f87171!important; }
.sug-name { flex:1; }
.sug-pts { font-family:‘Bebas Neue’,sans-serif; font-size:20px; }
.sug-empty { font-size:11px; color:#4a4a56; text-align:center; padding:16px 0; }

/* ══════════════════════════════════════
SCORE PANEL header
══════════════════════════════════════ */
.sp-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.sp-logo { font-family:‘Bebas Neue’,sans-serif; font-size:36px; color:#f0c040; letter-spacing:2px; line-height:1; }
/* mobile: hide logo since it’s in bar header */
@media(max-width:700px) { .sp-logo { display:none; } }
.btn-new {
background:none; border:1px solid #2a2a32; color:#5a5a66; -webkit-text-fill-color:#5a5a66;
font-family:‘Inconsolata’,monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
padding:5px 10px; cursor:pointer; border-radius:4px; transition:all .12s;
}
.btn-new:hover { border-color:#f87171; color:#f87171; -webkit-text-fill-color:#f87171; }

/* player legend (mobile) */
#player-legend { display:none; flex-wrap:wrap; gap:7px 13px; margin-bottom:12px; font-size:12px; font-weight:700; }
@media(max-width:540px) { #player-legend { display:flex; } }
.pl-chip { display:flex; align-items:center; gap:5px; }
.pl-ini { width:20px; height:20px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:‘Bebas Neue’,sans-serif; font-size:14px; color:#000!important; -webkit-text-fill-color:#000!important; flex-shrink:0; }
.pl-nm { color:#f0ede8!important; -webkit-text-fill-color:#f0ede8!important; }

/* ══════════════════════════════════════
TABLE
══════════════════════════════════════ */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
table { border-collapse:collapse; table-layout:fixed; width:100%; }
th,td { padding:0; overflow:hidden; }

.ph-row th {
padding:5px 3px 12px; text-align:center;
font-family:‘Bebas Neue’,sans-serif; font-size:18px; letter-spacing:.5px;
}
.ph-row th.lc {
text-align:left; padding-right:6px;
font-family:‘Inconsolata’,monospace; font-size:10px; letter-spacing:0; font-weight:400;
color:#4a4a56!important; -webkit-text-fill-color:#4a4a56!important;
}
.th-full { display:inline; }
.th-init { display:none; }
@media(max-width:540px) {
.th-full { display:none; }
.th-init { display:inline; }
.ph-row th { font-size:20px; padding:3px 1px 8px; }
}
.ph-row th.active-col { border-bottom:2px solid currentColor; }

.sec-row td { background:#1e1e24; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:#5a5a66; padding:5px 6px; font-weight:700; }
.sr td { height:38px; border-bottom:1px solid #1a1a1e; vertical-align:middle; }
.sr:hover td { background:#131316; }
.sr td.lc { color:#6a6a78; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding-right:6px; }
@media(max-width:540px) { .sr td.lc { font-size:9px; letter-spacing:.02em; } .sr td { height:36px; } }

/* ── CELLS ── */
.cell {
margin:3px; border-radius:4px; height:32px;
display:flex; align-items:center; justify-content:center;
position:relative; transition:border-color .12s, background .12s;
font-family:‘Bebas Neue’,sans-serif; font-size:18px; letter-spacing:.5px;
}

/* scored (locked) */
.cell-scored { background:#1a2e10; border:1.5px solid #3a4a28; color:#cce8b8!important; -webkit-text-fill-color:#cce8b8!important; }
.cell-scored::after { content:‘✓’; position:absolute; top:1px; right:3px; font-size:8px; color:#4ade80; line-height:1; font-family:sans-serif; }
.cell-scored.z { background:#2a1a1a; border-color:#4a2828; color:#f87171!important; -webkit-text-fill-color:#f87171!important; }
.cell-scored.z::after { content:‘✕’; color:#f87171; }

/* preview — current player, after roll, not yet assigned */
/* green: best available score */
.cell-preview-green {
background:#1a3010; border:1.5px solid #4ade80; cursor:pointer;
color:#4ade80!important; -webkit-text-fill-color:#4ade80!important;
}
.cell-preview-green:hover { background:#22401a; border-color:#6aee9a; }
/* yellow: decent / non-zero score */
.cell-preview-yellow {
background:#1e1c0a; border:1.5px solid #f0c040; cursor:pointer;
color:#f0c040!important; -webkit-text-fill-color:#f0c040!important;
}
.cell-preview-yellow:hover { background:#282408; border-color:#f8d060; }
/* red: would score zero */
.cell-preview-red {
background:#2a1212; border:1.5px solid #f87171; cursor:pointer;
color:#f87171!important; -webkit-text-fill-color:#f87171!important;
opacity:.75;
}
.cell-preview-red:hover { opacity:1; }

/* empty */
.cell-empty { background:#111114; border:1.5px solid #2a2a32; color:#28282e!important; -webkit-text-fill-color:#28282e!important; }

/* toggle */
.cell-toggle { cursor:pointer; user-select:none; border:1.5px solid #1e2a44; background:#111820; color:#2a3a5a!important; -webkit-text-fill-color:#2a3a5a!important; flex-direction:column; gap:0; }
.cell-toggle:hover { border-color:#3a4a7a; }
.cell-toggle.sf { background:#1a2e10; border-color:#4ade80; color:#4ade80!important; -webkit-text-fill-color:#4ade80!important; }
.cell-toggle.sf::after { content:‘✓’; position:absolute; top:1px; right:3px; font-size:8px; color:#4ade80; line-height:1; font-family:sans-serif; }
.cell-toggle.sz { background:#2a1a1a; border-color:#4a2828; color:#f87171!important; -webkit-text-fill-color:#f87171!important; }
.cell-toggle.sz::after { content:‘✕’; position:absolute; top:1px; right:3px; font-size:8px; color:#f87171; line-height:1; font-family:sans-serif; }
.tog-hint { font-size:7px; font-family:‘Inconsolata’,monospace; font-weight:400; letter-spacing:.04em; opacity:.5; line-height:1; color:inherit!important; -webkit-text-fill-color:inherit!important; }

/* yahtzee */
.cell-ytz { background:#1c1208; border:1.5px solid #3a2008; cursor:pointer; user-select:none; flex-direction:column; gap:0; transition:all .12s; }
.cell-ytz:hover { border-color:#604010; }
.ytz-v { font-family:‘Bebas Neue’,sans-serif; font-size:17px; letter-spacing:.5px; line-height:1; color:#5a3a10!important; -webkit-text-fill-color:#5a3a10!important; }
.ytz-s { font-size:7px; letter-spacing:.03em; line-height:1; color:#5a3a10!important; -webkit-text-fill-color:#5a3a10!important; }
.cell-ytz.y1  { background:#2a1e08; border-color:#c08020; }
.cell-ytz.y1  .ytz-v { color:#f0c040!important; -webkit-text-fill-color:#f0c040!important; }
.cell-ytz.y1  .ytz-s { color:#a07828!important; -webkit-text-fill-color:#a07828!important; }
.cell-ytz.ym  { background:#2a2208; border-color:#f0c040; box-shadow:0 0 0 1px #f0c04028; }
.cell-ytz.ym  .ytz-v { color:#f0c040!important; -webkit-text-fill-color:#f0c040!important; }
.cell-ytz.ym  .ytz-s { color:#c09830!important; -webkit-text-fill-color:#c09830!important; }
.cell-ytz.y0  { background:#2a1a1a; border-color:#4a2828; }
.cell-ytz.y0  .ytz-v { color:#f87171!important; -webkit-text-fill-color:#f87171!important; }
.cell-ytz.y0  .ytz-s { color:#a05050!important; -webkit-text-fill-color:#a05050!important; }

/* stat rows */
.sub-row td,.bon-row td,.tot-row td { vertical-align:middle; text-align:center; }
.sub-row td { height:30px; border-top:1px solid #2a2a32; border-bottom:1px solid #2a2a32; font-size:12px; color:#6a6a78; }
.sub-row td.lc { font-size:9px; text-transform:uppercase; letter-spacing:.09em; }
.sub-row .v { font-weight:700; font-size:14px; color:#f0ede8!important; -webkit-text-fill-color:#f0ede8!important; }
.bon-row td { height:26px; border-bottom:1px solid #1a1a1e; font-size:11px; color:#6a6a78; }
.bon-row td.lc { font-size:9px; text-transform:uppercase; letter-spacing:.08em; }
.bon-row .v { font-size:12px; font-weight:600; color:#6a6a78!important; -webkit-text-fill-color:#6a6a78!important; }
.bon-row .yes  { color:#4ade80!important; -webkit-text-fill-color:#4ade80!important; }
.bon-row .near { color:#f0c040!important; -webkit-text-fill-color:#f0c040!important; }
.tot-row td { height:52px; border-top:2px solid #2a2a32; font-family:‘Bebas Neue’,sans-serif; font-size:32px; letter-spacing:1px; }
.tot-row td.lc { font-size:14px; color:#5a5a66!important; -webkit-text-fill-color:#5a5a66!important; }

/* ══════════════════════════════════════
POPUP
══════════════════════════════════════ */
#popup-overlay { display:none; position:fixed; inset:0; background:#000000bb; z-index:300; align-items:center; justify-content:center; padding:20px; }
#popup-overlay.open { display:flex; }
.popup { background:#18181c; border:1px solid #3a3a44; border-radius:8px; padding:24px; width:100%; max-width:340px; animation:popIn .18s ease; }
@keyframes popIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:none} }
.popup-title { font-family:‘Bebas Neue’,sans-serif; font-size:24px; color:#f0c040; letter-spacing:1px; margin-bottom:3px; }
.popup-player { font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:14px; }
.popup-info { font-size:11px; color:#5a5a66; margin-bottom:14px; line-height:1.5; }
.popup-actions { display:flex; flex-direction:column; gap:7px; }
.popup-btn { height:46px; border:none; border-radius:5px; cursor:pointer; font-family:‘Bebas Neue’,sans-serif; font-size:18px; letter-spacing:1px; transition:opacity .12s; }
.popup-btn:hover { opacity:.85; }
.pb-score  { background:#4ade80; color:#000!important; -webkit-text-fill-color:#000!important; }
.pb-zero   { background:#2a1a1a; border:1.5px solid #4a2828!important; color:#f87171!important; -webkit-text-fill-color:#f87171!important; }
.pb-add    { background:#f0c040; color:#000!important; -webkit-text-fill-color:#000!important; }
.pb-undo   { background:#222228; border:1px solid #3a3a44!important; color:#f0ede8!important; -webkit-text-fill-color:#f0ede8!important; font-size:14px; }
.pb-cancel { background:none; border:1px solid #2a2a32!important; color:#5a5a66!important; -webkit-text-fill-color:#5a5a66!important; font-size:14px; }
.popup-div { height:1px; background:#2a2a32; margin:2px 0; }

/* ══════════════════════════════════════
WINNER
══════════════════════════════════════ */
#winner-bar { display:none; margin:16px 14px; padding:24px; border:1px solid #3a3a44; background:#18181c; border-radius:6px; text-align:center; animation:pop .35s ease; }
@keyframes pop { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:none} }
#winner-bar .wl { font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:#5a5a66; margin-bottom:4px; }
#winner-bar .wn { font-family:‘Bebas Neue’,sans-serif; font-size:52px; letter-spacing:2px; }
#winner-bar .ws { font-size:12px; color:#5a5a66; margin-top:3px; }
.lb { margin-top:14px; display:flex; flex-direction:column; gap:4px; }
.lb-row { display:flex; align-items:center; justify-content:space-between; background:#111114; border:1px solid #2a2a32; border-radius:4px; padding:5px 12px; font-size:13px; }
.lb-row.first { border-color:#f0c04044; background:#1e1c0a; }

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const PALETTE=['#f0c040','#f87171','#4ade80','#60a5fa','#c084fc','#fb923c','#f472b6','#34d399'];

const UPPER=[
  {id:'aces',   label:'Asso ×1',    type:'free', face:1, max:5 },
  {id:'twos',   label:'Due ×2',     type:'free', face:2, max:10},
  {id:'threes', label:'Tre ×3',     type:'free', face:3, max:15},
  {id:'fours',  label:'Quattro ×4', type:'free', face:4, max:20},
  {id:'fives',  label:'Cinque ×5',  type:'free', face:5, max:25},
  {id:'sixes',  label:'Sei ×6',     type:'free', face:6, max:30},
];
const LOWER=[
  {id:'tris',    label:'3 di un tipo',  type:'free',   max:30},
  {id:'poker',   label:'4 di un tipo',  type:'free',   max:30},
  {id:'full',    label:'Full House',    type:'toggle', fixed:25},
  {id:'sm_str',  label:'Scala Piccola', type:'toggle', fixed:30},
  {id:'lg_str',  label:'Scala Grande',  type:'toggle', fixed:40},
  {id:'yahtzee', label:'Yahtzee!',      type:'yahtzee'},
  {id:'chance',  label:'Chance',        type:'free',   max:30},
];
const ALL=[...UPPER,...LOWER];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let players=[], n=4;
let scores={}, yahtzeeCount={};
let dice=[1,1,1,1,1], held=[false,false,false,false,false];
let rollsLeft=3, hasRolled=false, curIdx=0, gameOver=false;
let popupCtx=null;

/* ══════════════════════════════════════
   SETUP
══════════════════════════════════════ */
function buildSetup(){
  const cr=document.getElementById('countRow'); cr.innerHTML='';
  for(let i=2;i<=8;i++){
    const b=document.createElement('button'); b.className='cnt-btn'+(i===n?' on':'');
    b.textContent=i; b.onclick=()=>{n=i;buildSetup();}; cr.appendChild(b);
  }
  buildFields();
}
function buildFields(){
  const nf=document.getElementById('name-fields');
  const prev=Array.from(nf.querySelectorAll('.n-inp')).map(x=>x.value);
  nf.innerHTML='';
  for(let i=0;i<n;i++){
    const row=document.createElement('div'); row.className='nf-row';
    const dot=document.createElement('div'); dot.className='p-dot'; dot.style.background=PALETTE[i];
    const inp=document.createElement('input');
    inp.className='n-inp'; inp.type='text'; inp.maxLength=12;
    inp.placeholder=`Giocatore ${i+1}`; inp.value=prev[i]||''; inp.oninput=validateGo;
    row.appendChild(dot); row.appendChild(inp); nf.appendChild(row);
  }
  validateGo();
}
function validateGo(){
  const vals=Array.from(document.querySelectorAll('.n-inp')).map(x=>x.value.trim());
  document.getElementById('btnGo').disabled=!vals.every(v=>v.length>0)||new Set(vals).size!==vals.length;
}
function startGame(){
  players=Array.from(document.querySelectorAll('.n-inp')).map((inp,i)=>({name:inp.value.trim(),color:PALETTE[i]}));
  scores={}; yahtzeeCount={};
  players.forEach(p=>{scores[p.name]={};ALL.forEach(c=>scores[p.name][c.id]=null);yahtzeeCount[p.name]=0;});
  curIdx=0; gameOver=false;
  resetTurn();
  document.getElementById('screen-setup').style.display='none';
  document.getElementById('screen-game').style.display='block';
  document.getElementById('winner-bar').style.display='none';
  buildTable(); buildAllDice(); updateTurnUI(); updateTotals(); renderSuggestions();
}
function newGame(){
  if(!confirm('Tornare alla schermata iniziale?')) return;
  players=[]; scores={}; yahtzeeCount={};
  dice=[1,1,1,1,1]; held=[false,false,false,false,false];
  rollsLeft=3; hasRolled=false; curIdx=0; gameOver=false;
  document.getElementById('screen-setup').style.display='flex';
  document.getElementById('screen-game').style.display='none';
  document.getElementById('winner-bar').style.display='none';
  document.getElementById('tbl').innerHTML='';
  buildSetup();
}

/* ══════════════════════════════════════
   PIP DRAWING
══════════════════════════════════════ */
const PIP_POS={
  1:[[.5,.5]],
  2:[[.3,.3],[.7,.7]],
  3:[[.3,.3],[.5,.5],[.7,.7]],
  4:[[.3,.3],[.7,.3],[.3,.7],[.7,.7]],
  5:[[.3,.3],[.7,.3],[.5,.5],[.3,.7],[.7,.7]],
  6:[[.3,.25],[.7,.25],[.3,.5],[.7,.5],[.3,.75],[.7,.75]],
};

function drawDie(canvas, val, isHeld){
  const dpr=window.devicePixelRatio||1;
  const sz=canvas.offsetWidth||60;
  canvas.width=sz*dpr; canvas.height=sz*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // bg
  ctx.fillStyle=isHeld?'#182e10':'#1e2030';
  roundRect(ctx,0,0,sz,sz,10); ctx.fill();

  // pips
  ctx.fillStyle=isHeld?'#4ade80':'#f0ede8';
  const r=sz*0.085;
  (PIP_POS[val]||[]).forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx*sz,fy*sz,r,0,Math.PI*2); ctx.fill();
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ══════════════════════════════════════
   BUILD & REFRESH DICE
══════════════════════════════════════ */
function makeDieEl(i, small){
  const die=document.createElement('div');
  die.className='die'+(held[i]?' held':'')+(!hasRolled||gameOver?' no-click':'');
  die.id=(small?'mob':'desk')+`-die${i}`;
  const canvas=document.createElement('canvas');
  canvas.style.cssText='width:100%;height:100%;display:block;border-radius:10px;';
  die.appendChild(canvas);
  die.onclick=()=>{ if(!hasRolled||gameOver) return; held[i]=!held[i]; refreshDie(i); };
  return die;
}

function buildAllDice(){
  ['desk-dice','mob-dice'].forEach((containerId,isMob)=>{
    const container=document.getElementById(containerId);
    if(!container) return;
    container.innerHTML='';
    for(let i=0;i<5;i++) container.appendChild(makeDieEl(i, isMob===1));
  });
  refreshAllDice();
}

function refreshDie(i, animate){
  ['desk','mob'].forEach(prefix=>{
    const die=document.getElementById(`${prefix}-die${i}`);
    if(!die) return;
    die.className='die'+(held[i]?' held':'')+(!hasRolled||gameOver?' no-click':'');
    const canvas=die.querySelector('canvas');
    if(!canvas) return;
    if(animate){
      die.classList.remove('bounce','fade-in');
      // force reflow
      void die.offsetWidth;
      die.classList.add('bounce','fade-in');
      setTimeout(()=>{ die.classList.remove('bounce','fade-in'); }, 400);
    }
    // draw after layout
    requestAnimationFrame(()=>drawDie(canvas, dice[i], held[i]));
  });
}

function refreshAllDice(animate){
  for(let i=0;i<5;i++) refreshDie(i, animate);
}

/* redraw on resize/orientation — double rAF ensures layout is settled */
function onResize(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>refreshAllDice()));
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=>setTimeout(onResize, 150));

/* ══════════════════════════════════════
   ROLL
══════════════════════════════════════ */
function resetTurn(){
  dice=[1,1,1,1,1]; held=[false,false,false,false,false];
  rollsLeft=3; hasRolled=false;
}

function doRoll(){
  if(rollsLeft<=0||gameOver) return;
  hasRolled=true;

  // randomise unheld dice
  const rolling=[];
  for(let i=0;i<5;i++){
    if(!held[i]){
      dice[i]=Math.ceil(Math.random()*6);
      rolling.push(i);
    }
  }

  rollsLeft--;
  updateRollBtns();
  updatePips();
  // stagger the bounce by index for a nice cascade feel
  rolling.forEach((i,order)=>{
    setTimeout(()=>refreshDie(i, true), order*55);
  });
  setTimeout(()=>{ renderSuggestions(); refreshAllCells(); }, rolling.length*55+60);
}

function updateRollBtns(){
  ['desk-roll-btn','mob-roll-btn'].forEach(id=>{
    const btn=document.getElementById(id);
    if(!btn) return;
    if(gameOver){ btn.disabled=true; btn.textContent='Partita finita'; return; }
    if(rollsLeft===3){ btn.disabled=false; btn.textContent='🎲 LANCIA'; }
    else if(rollsLeft===2){ btn.disabled=false; btn.textContent='🎲 RILANCIA (2)'; }
    else if(rollsLeft===1){ btn.disabled=false; btn.textContent='🎲 RILANCIA (1)'; }
    else{ btn.disabled=true; btn.textContent='LANCI ESAURITI'; }
  });
}

function updatePips(){
  const used=3-rollsLeft;
  ['d','m'].forEach(p=>{
    for(let i=0;i<3;i++){
      const el=document.getElementById(`${p==='d'?'d':'m'}rp${i}`);
      if(el) el.className='rp'+(i<used?' used':'');
    }
  });
}

/* ══════════════════════════════════════
   SCORE CALCULATION
══════════════════════════════════════ */
function counts(){ const c=Array(7).fill(0); dice.forEach(d=>c[d]++); return c; }
function sumAll(){ return dice.reduce((a,b)=>a+b,0); }
function hasRun(sorted,len){ let r=1; for(let i=1;i<sorted.length;i++){ r=sorted[i]===sorted[i-1]+1?r+1:1; if(r>=len)return true; } return false; }

function calcScore(catId){
  const c=counts(), s=sumAll();
  switch(catId){
    case 'aces':   return c[1];
    case 'twos':   return c[2]*2;
    case 'threes': return c[3]*3;
    case 'fours':  return c[4]*4;
    case 'fives':  return c[5]*5;
    case 'sixes':  return c[6]*6;
    case 'tris':   return c.some(x=>x>=3)?s:0;
    case 'poker':  return c.some(x=>x>=4)?s:0;
    case 'full':   return (c.some(x=>x===3)&&c.some(x=>x===2))||c.some(x=>x===5)?25:0;
    case 'sm_str': { const u=[...new Set(dice)].sort((a,b)=>a-b); return hasRun(u,4)?30:0; }
    case 'lg_str': { const u=[...new Set(dice)].sort((a,b)=>a-b); return hasRun(u,5)?40:0; }
    case 'yahtzee':return c.some(x=>x===5)?50:0;
    case 'chance': return s;
    default: return 0;
  }
}

/* ══════════════════════════════════════
   SUGGESTIONS
══════════════════════════════════════ */
function renderSuggestions(){
  const area=document.getElementById('desk-sug');
  if(!area) return;
  if(!hasRolled||gameOver){
    area.innerHTML=`<div class="sug-empty">${gameOver?'Partita terminata 🎲':'Lancia i dadi per i punteggi'}</div>`;
    return;
  }
  const cp=players[curIdx];
  const avail=ALL.filter(c=>scores[cp.name][c.id]===null);
  if(!avail.length){ area.innerHTML='<div class="sug-empty">Tutto compilato!</div>'; return; }

  const opts=avail.map(c=>({cat:c,pts:calcScore(c.id)}));
  const best=Math.max(...opts.map(x=>x.pts));
  opts.sort((a,b)=>b.pts-a.pts);

  let html='<div class="sug-title">Assegna punteggio</div><div class="sug-list">';
  opts.forEach(({cat,pts})=>{
    const isBest=pts===best&&pts>0;
    html+=`<button class="sug-btn${isBest?' best':''}${pts===0?' zero-s':''}" onclick="assignScore('${cat.id}')">
      <span class="sug-name">${cat.label}</span>
      ${isBest?'<span class="sug-badge">top</span>':''}
      <span class="sug-pts">${pts}</span>
    </button>`;
  });
  html+='</div>';
  area.innerHTML=html;
}

function assignScore(catId){
  if(!hasRolled||gameOver) return;
  const cp=players[curIdx];
  if(scores[cp.name][catId]!==null) return; // already scored, ignore
  const cat=ALL.find(c=>c.id===catId);
  const pts=calcScore(catId); // always from current dice

  if(cat.type==='yahtzee'){
    openYahtzeePopup(cp, true, pts>0);
    return;
  }
  if(cat.type==='toggle'){
    // rigid: valid combo → fixed value; invalid → 0. No manual override.
    scores[cp.name][catId]=pts>0?cat.fixed:0;
  } else {
    scores[cp.name][catId]=pts;
  }
  refreshCell(cp,cat);
  afterAssign();
}

function afterAssign(){
  updateTotals(); checkGameOver();
  if(!gameOver) advanceTurn();
}

/* ══════════════════════════════════════
   TURN
══════════════════════════════════════ */
function advanceTurn(){
  let attempts=0;
  do {
    curIdx=(curIdx+1)%players.length; attempts++;
    if(attempts>players.length) break;
  } while(ALL.every(c=>scores[players[curIdx].name][c.id]!==null));

  resetTurn();
  buildAllDice();
  updateRollBtns();
  updatePips();
  updateTurnUI();
  renderSuggestions();
  refreshAllCells();
  highlightActiveCol();
}

function updateTurnUI(){
  if(gameOver) return;
  const cp=players[curIdx];
  ['desk-turn-name','mob-turn-name'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.textContent=cp.name.toUpperCase();
    el.style.color=cp.color; el.style.webkitTextFillColor=cp.color;
  });
  updatePips();
}

function highlightActiveCol(){
  document.querySelectorAll('.ph-row th').forEach(th=>th.classList.remove('active-col'));
  if(gameOver) return;
  const th=document.getElementById(`th_${players[curIdx].name}`);
  if(th){ th.classList.add('active-col'); }
}

/* ══════════════════════════════════════
   TABLE
══════════════════════════════════════ */
function buildTable(){
  const t=document.getElementById('tbl'); t.innerHTML='';

  // mobile legend
  const leg=document.getElementById('player-legend'); leg.innerHTML='';
  players.forEach(p=>{
    const chip=document.createElement('div'); chip.className='pl-chip';
    const ini=document.createElement('div'); ini.className='pl-ini'; ini.style.background=p.color; ini.textContent=p.name[0].toUpperCase();
    const nm=document.createElement('span'); nm.className='pl-nm'; nm.textContent=p.name;
    chip.appendChild(ini); chip.appendChild(nm); leg.appendChild(chip);
  });

  // colgroup
  const cg=document.createElement('colgroup');
  const cl=document.createElement('col'); cl.style.width='100px'; cg.appendChild(cl);
  players.forEach(()=>{ const c=document.createElement('col'); c.style.width=`${Math.floor(100/players.length)}%`; cg.appendChild(c); });
  t.appendChild(cg);

  // header
  const hr=document.createElement('tr'); hr.className='ph-row';
  const th0=document.createElement('th'); th0.className='lc'; hr.appendChild(th0);
  players.forEach(p=>{
    const th=document.createElement('th'); th.id=`th_${p.name}`;
    const f=document.createElement('span'); f.className='th-full'; f.textContent=p.name.toUpperCase();
    const in2=document.createElement('span'); in2.className='th-init'; in2.textContent=p.name[0].toUpperCase();
    th.appendChild(f); th.appendChild(in2);
    th.style.color=p.color; th.style.webkitTextFillColor=p.color;
    hr.appendChild(th);
  });
  t.appendChild(hr);

  addSec(t,'◎ SEZIONE ALTA');
  UPPER.forEach(c=>addCatRow(t,c));
  addStatRow(t,'sub-row','Subtotale','sub');
  addStatRow(t,'bon-row','Bonus +35','bon');
  addSec(t,'◎ SEZIONE BASSA');
  LOWER.forEach(c=>addCatRow(t,c));
  addStatRow(t,'tot-row','TOTALE','tot');
  highlightActiveCol();
}

function addSec(t,label){
  const tr=document.createElement('tr'); tr.className='sec-row';
  const td=document.createElement('td'); td.colSpan=1+players.length; td.textContent=label;
  tr.appendChild(td); t.appendChild(tr);
}
function addCatRow(t,cat){
  const tr=document.createElement('tr'); tr.className='sr';
  const tl=document.createElement('td'); tl.className='lc'; tl.textContent=cat.label; tr.appendChild(tl);
  players.forEach(p=>{ const td=document.createElement('td'); td.appendChild(buildCell(cat,p)); tr.appendChild(td); });
  t.appendChild(tr);
}
function addStatRow(t,cls,label,pfx){
  const tr=document.createElement('tr'); tr.className=cls;
  const tl=document.createElement('td'); tl.className='lc'; tl.textContent=label; tr.appendChild(tl);
  players.forEach(p=>{ const td=document.createElement('td'); td.className='v'; td.id=`${pfx}_${p.name}`; td.textContent='0'; tr.appendChild(td); });
  t.appendChild(tr);
}

/* ══════════════════════════════════════
   CELLS
══════════════════════════════════════ */
function buildCell(cat,p){
  const div=document.createElement('div'); div.id=`cell_${p.name}_${cat.id}`;
  renderCell(div,cat,p); return div;
}
function renderCell(div,cat,p){
  const val=scores[p.name][cat.id];
  const isCur=!gameOver&&players[curIdx]&&players[curIdx].name===p.name;
  div.innerHTML=''; div.className='cell'; div.onclick=null; div.style.cursor='default';

  /* ── Already scored — locked display ── */
  if(val!==null){
    if(cat.type==='toggle'){
      div.classList.add('cell-toggle');
      if(val===cat.fixed){ div.classList.add('sf'); div.textContent=cat.fixed; }
      else               { div.classList.add('sz'); div.textContent='0'; }
    } else if(cat.type==='yahtzee'){
      div.classList.add('cell-ytz'); renderYtz(div,p);
    } else {
      div.classList.add('cell-scored');
      if(val===0) div.classList.add('z');
      div.textContent=val;
    }
    return;
  }

  /* ── Current player, after roll — preview & clickable ── */
  if(isCur && hasRolled){
    const pts=calcScore(cat.id); // always from dice

    if(cat.type==='yahtzee'){
      // yahtzee preview colour based on dice
      div.classList.add('cell-ytz');
      const ytzValid=pts>0;
      if(ytzValid){ div.classList.add('y1'); } // light up
      renderYtz(div,p);
      div.style.cursor='pointer';
      div.onclick=()=>openYahtzeePopup(p, true, ytzValid);
      return;
    }

    if(cat.type==='toggle'){
      div.classList.add('cell-toggle');
      const valid=pts>0;
      if(valid){
        // combo achieved — green, clickable to confirm
        div.classList.add('sf');
        div.textContent=cat.fixed;
        div.style.cursor='pointer';
        div.onclick=()=>{ scores[p.name][cat.id]=cat.fixed; refreshCell(p,cat); afterAssign(); };
      } else {
        // combo not achieved — red, clickable to sacrifice as 0
        div.classList.add('sz');
        const v=document.createElement('span'); v.textContent='0';
        const h=document.createElement('div'); h.className='tog-hint'; h.textContent='non fatto';
        div.appendChild(v); div.appendChild(h);
        div.style.cursor='pointer';
        div.onclick=()=>{ scores[p.name][cat.id]=0; refreshCell(p,cat); afterAssign(); };
      }
      return;
    }

    /* free category — colour by score tier */
    const best=getBestFree(p);
    let tier;
    if(pts>0 && pts===best) tier='cell-preview-green';
    else if(pts>0)           tier='cell-preview-yellow';
    else                     tier='cell-preview-red';

    div.classList.add(tier);
    div.textContent=pts;
    div.onclick=()=>{ scores[p.name][cat.id]=pts; refreshCell(p,cat); afterAssign(); };
    return;
  }

  /* ── Other player / before roll — neutral empty ── */
  if(cat.type==='toggle'){
    div.classList.add('cell-toggle');
    const v=document.createElement('span'); v.textContent=cat.fixed;
    const h=document.createElement('div'); h.className='tog-hint'; h.textContent='—';
    div.appendChild(v); div.appendChild(h);
  } else if(cat.type==='yahtzee'){
    div.classList.add('cell-ytz'); renderYtz(div,p);
  } else {
    div.classList.add('cell-empty'); div.textContent='·';
  }
}

function getBestFree(p){
  const avail=ALL.filter(c=>c.type==='free'&&scores[p.name][c.id]===null);
  return avail.length ? Math.max(...avail.map(c=>calcScore(c.id))) : 0;
}
function refreshCell(p,cat){ const d=document.getElementById(`cell_${p.name}_${cat.id}`); if(d) renderCell(d,cat,p); }
function refreshAllCells(){ players.forEach(p=>ALL.forEach(c=>refreshCell(p,c))); }

/* ══════════════════════════════════════
   TOGGLE & YAHTZEE RENDER
══════════════════════════════════════ */
function renderToggle(div,cat,p){
  const val=scores[p.name][cat.id];
  div.classList.remove('sf','sz'); div.innerHTML='';
  if(val===cat.fixed){ div.classList.add('sf'); div.textContent=cat.fixed; }
  else if(val===0){ div.classList.add('sz'); div.textContent='0'; }
  else { const v=document.createElement('span'); v.textContent=cat.fixed; const h=document.createElement('div'); h.className='tog-hint'; h.textContent='tap'; div.appendChild(v); div.appendChild(h); }
}
function renderYtz(div,p){
  div.innerHTML=''; div.classList.remove('y1','ym','y0');
  const cnt=yahtzeeCount[p.name], val=scores[p.name]['yahtzee'];
  const v=document.createElement('div'); v.className='ytz-v';
  const s=document.createElement('div'); s.className='ytz-s';
  if(val===0){ div.classList.add('y0'); v.textContent='0'; s.textContent='non ottenuto'; }
  else if(cnt===0){ v.textContent='50'; s.textContent='tap'; }
  else if(cnt===1){ div.classList.add('y1'); v.textContent='50'; s.textContent='×1'; }
  else { div.classList.add('ym'); v.textContent=50+(cnt-1)*100; s.textContent=`×${cnt}`; }
  div.appendChild(v); div.appendChild(s);
}

/* ══════════════════════════════════════
   YAHTZEE POPUP
══════════════════════════════════════ */
function openYahtzeePopup(p, andAdvance, diceValid){
  popupCtx={p, andAdvance};
  const cnt=yahtzeeCount[p.name], val=scores[p.name]['yahtzee'];
  document.getElementById('popup-title').textContent='Yahtzee!';
  const pEl=document.getElementById('popup-player');
  pEl.textContent=p.name.toUpperCase(); pEl.style.color=p.color; pEl.style.webkitTextFillColor=p.color;
  const info=document.getElementById('popup-info');
  const actions=document.getElementById('popup-actions'); actions.innerHTML='';

  if(val===0){
    info.textContent='Segnato come 0 (non ottenuto).';
    addPBtn(actions,'Annulla (torna a —)','pb-cancel',()=>{scores[p.name]['yahtzee']=null;yahtzeeCount[p.name]=0;finishPopup(false);});
    addPBtn(actions,'Chiudi','pb-cancel',()=>finishPopup(false));
  } else if(cnt===0){
    if(andAdvance && !diceValid){
      // Current turn but dice don't show yahtzee
      info.textContent='I dadi non mostrano uno Yahtzee. Puoi segnare 0 per questa categoria.';
      addPBtn(actions,'Segna 0 (non ottenuto)','pb-zero',()=>{yahtzeeCount[p.name]=0;scores[p.name]['yahtzee']=0;finishPopup(andAdvance);});
      addPBtn(actions,'Annulla','pb-cancel',()=>finishPopup(false));
    } else {
      info.textContent= andAdvance
        ? '🎲 Tutti e 5 uguali! Primo Yahtzee = 50 pt.'
        : 'Primo Yahtzee vale 50 pt.';
      if(andAdvance && diceValid)
        addPBtn(actions,'Segna Yahtzee! (+50)','pb-score',()=>{yahtzeeCount[p.name]=1;scores[p.name]['yahtzee']=50;finishPopup(andAdvance);});
      addPBtn(actions,'Non ottenuto (0)','pb-zero',()=>{yahtzeeCount[p.name]=0;scores[p.name]['yahtzee']=0;finishPopup(andAdvance);});
      addPBtn(actions,'Annulla','pb-cancel',()=>finishPopup(false));
    }
  } else {
    const cur=50+(cnt-1)*100;
    if(andAdvance && diceValid){
      info.innerHTML=`🎲 Ancora uno! Hai <strong style="color:#f0c040;-webkit-text-fill-color:#f0c040">${cnt}×</strong> Yahtzee (${cur} pt). Ogni aggiuntivo vale <strong>+100</strong>.`;
      addPBtn(actions,`Aggiungi Yahtzee! (+100 → ${cur+100})`,'pb-add',()=>{yahtzeeCount[p.name]++;scores[p.name]['yahtzee']=50+(yahtzeeCount[p.name]-1)*100;finishPopup(andAdvance);});
    } else {
      info.innerHTML=`Hai <strong style="color:#f0c040;-webkit-text-fill-color:#f0c040">${cnt}×</strong> Yahtzee (${cur} pt).`;
    }
    const dv=document.createElement('div'); dv.className='popup-div'; actions.appendChild(dv);
    addPBtn(actions,`↩ Annulla ultimo (→${cnt>1?50+(cnt-2)*100:0})`,'pb-undo',()=>{yahtzeeCount[p.name]=Math.max(0,cnt-1);scores[p.name]['yahtzee']=yahtzeeCount[p.name]===0?null:50+(yahtzeeCount[p.name]-1)*100;finishPopup(false);});
    addPBtn(actions,'Chiudi','pb-cancel',()=>finishPopup(false));
  }
  document.getElementById('popup-overlay').classList.add('open');
}
function finishPopup(andAdvance){
  document.getElementById('popup-overlay').classList.remove('open');
  if(popupCtx){
    const {p}=popupCtx;
    const d=document.getElementById(`cell_${p.name}_yahtzee`); if(d) renderYtz(d,p);
    updateTotals(); checkGameOver();
    if(andAdvance&&!gameOver) advanceTurn();
    popupCtx=null;
  }
}
function addPBtn(c,label,cls,fn){ const b=document.createElement('button'); b.className=`popup-btn ${cls}`; b.textContent=label; b.onclick=fn; c.appendChild(b); }
function closePopup(e){ if(e&&e.target!==document.getElementById('popup-overlay')) return; finishPopup(false); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') finishPopup(false); });

/* ══════════════════════════════════════
   TOTALS
══════════════════════════════════════ */
const uSum=p=>UPPER.reduce((s,c)=>s+(scores[p.name][c.id]||0),0);
const lSum=p=>LOWER.reduce((s,c)=>s+(scores[p.name][c.id]||0),0);
const bon =p=>uSum(p)>=63?35:0;
const gTot=p=>uSum(p)+bon(p)+lSum(p);

function updateTotals(){
  players.forEach(p=>{
    const us=uSum(p),b=bon(p),gt=gTot(p),miss=63-us;
    const s=document.getElementById(`sub_${p.name}`); if(s){s.textContent=us;s.style.webkitTextFillColor='#f0ede8';}
    const bo=document.getElementById(`bon_${p.name}`);
    if(bo){ if(b>0){bo.textContent='+35 ✓';bo.className='v yes';}else{bo.textContent=`mancano ${miss}`;bo.className=miss<=10?'v near':'v';} }
    const to=document.getElementById(`tot_${p.name}`); if(to){to.textContent=gt;to.style.color=p.color;to.style.webkitTextFillColor=p.color;}
  });
}

/* ══════════════════════════════════════
   END
══════════════════════════════════════ */
function checkGameOver(){
  if(!players.every(p=>ALL.every(c=>scores[p.name][c.id]!==null))) return;
  gameOver=true; updateRollBtns();
  const sorted=[...players].sort((a,b)=>gTot(b)-gTot(a));
  const best=sorted[0];
  const wn=document.getElementById('w-name');
  wn.textContent=best.name.toUpperCase(); wn.style.color=best.color; wn.style.webkitTextFillColor=best.color;
  document.getElementById('w-score').textContent=`${gTot(best)} punti`;
  const lb=document.getElementById('leaderboard'); lb.innerHTML='';
  sorted.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='lb-row'+(i===0?' first':'');
    row.innerHTML=`<span class="lb-pos">${i+1}</span><span class="lb-name" style="color:${p.color};-webkit-text-fill-color:${p.color}">${p.name}</span><span class="lb-pts" style="color:${p.color};-webkit-text-fill-color:${p.color}">${gTot(p)}</span>`;
    lb.appendChild(row);
  });
  const wb=document.getElementById('winner-bar'); wb.style.display='block';
  wb.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
buildSetup();
</script>
